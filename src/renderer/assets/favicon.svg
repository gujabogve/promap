<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0820"/>
      <stop offset="100%" stop-color="#060312"/>
    </linearGradient>
    <linearGradient id="cubeTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#7B2FFF"/>
    </linearGradient>
    <linearGradient id="cubeRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7B2FFF"/>
      <stop offset="100%" stop-color="#4A1A9A"/>
    </linearGradient>
    <linearGradient id="cubeLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00BFCC"/>
      <stop offset="100%" stop-color="#006680"/>
    </linearGradient>
    <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#fbg)"/>

  <!-- Cube: top face -->
  <polygon points="16,4 24,8 16,12 8,8"
    fill="#0D0B1E" stroke="url(#cubeTop)" stroke-width="0.8" stroke-linejoin="round"/>
  <!-- Right face -->
  <polygon points="24,8 24,17 16,21 16,12"
    fill="#08051A" stroke="url(#cubeRight)" stroke-width="0.8" stroke-linejoin="round"/>
  <!-- Left face -->
  <polygon points="8,8 16,12 16,21 8,17"
    fill="#0A0720" stroke="url(#cubeLeft)" stroke-width="0.8" stroke-linejoin="round"/>

  <!-- Corner nodes -->
  <circle cx="16" cy="4"  r="1.2" fill="#00E5FF" filter="url(#g)"/>
  <circle cx="24" cy="8"  r="0.9" fill="#00CCEE"/>
  <circle cx="8"  cy="8"  r="0.9" fill="#7B2FFF"/>
  <circle cx="16" cy="12" r="0.9" fill="#A78BFF" filter="url(#g)"/>
  <circle cx="16" cy="21" r="1.2" fill="#7B2FFF" filter="url(#g)"/>

  <!-- PM text -->
  <text x="16" y="29"
    font-family="'Arial Black', sans-serif"
    font-size="6" font-weight="900" letter-spacing="0.5"
    fill="#A78BFF" text-anchor="middle">PM</text>
</svg>
