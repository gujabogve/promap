<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ibg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0820"/>
      <stop offset="100%" stop-color="#060312"/>
    </linearGradient>
    <linearGradient id="cg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#7B2FFF"/>
    </linearGradient>
    <linearGradient id="tg1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="55%" stop-color="#A78BFF"/>
      <stop offset="100%" stop-color="#7B2FFF"/>
    </linearGradient>
    <linearGradient id="cubeTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#7B2FFF"/>
    </linearGradient>
    <linearGradient id="cubeRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7B2FFF"/>
      <stop offset="100%" stop-color="#4A1A9A"/>
    </linearGradient>
    <linearGradient id="cubeLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00BFCC"/>
      <stop offset="100%" stop-color="#006680"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSm" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#ibg)"/>

  <!-- Grid lines (clipped) -->
  <g clip-path="url(#iconClip)" opacity="0.2">
    <line x1="0" y1="360" x2="512" y2="360" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="390" x2="512" y2="390" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="418" x2="512" y2="418" stroke="#00E5FF" stroke-width="1"/>
    <line x1="100" y1="340" x2="88"  y2="512" stroke="#7B2FFF" stroke-width="1"/>
    <line x1="180" y1="340" x2="174" y2="512" stroke="#7B2FFF" stroke-width="1"/>
    <line x1="256" y1="340" x2="256" y2="512" stroke="#7B2FFF" stroke-width="1"/>
    <line x1="332" y1="340" x2="338" y2="512" stroke="#7B2FFF" stroke-width="1"/>
    <line x1="412" y1="340" x2="424" y2="512" stroke="#7B2FFF" stroke-width="1"/>
  </g>

  <!-- Projection rays -->
  <g clip-path="url(#iconClip)">
    <line x1="256" y1="240" x2="512" y2="100" stroke="#00E5FF" stroke-width="1.2" opacity="0.25"/>
    <line x1="256" y1="240" x2="512" y2="190" stroke="#00E5FF" stroke-width="1" opacity="0.2"/>
    <line x1="256" y1="240" x2="512" y2="260" stroke="#7B2FFF" stroke-width="1.2" opacity="0.25"/>
    <line x1="256" y1="240" x2="512" y2="340" stroke="#7B2FFF" stroke-width="1" opacity="0.2"/>
    <line x1="256" y1="240" x2="512" y2="400" stroke="#A78BFF" stroke-width="1" opacity="0.15"/>
  </g>

  <!-- CUBE — isometric, centered -->
  <!-- Top face -->
  <polygon points="256,92 368,150 256,208 144,150"
    fill="#0D0B1E" stroke="url(#cubeTop)" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Right face -->
  <polygon points="368,150 368,290 256,348 256,208"
    fill="#08051A" stroke="url(#cubeRight)" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Left face -->
  <polygon points="144,150 256,208 256,348 144,290"
    fill="#0A0720" stroke="url(#cubeLeft)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Top face inner lines -->
  <line x1="256" y1="92"  x2="256" y2="208" stroke="#00E5FF" stroke-width="1" opacity="0.35"/>
  <line x1="200" y1="121" x2="312" y2="179" stroke="#00E5FF" stroke-width="0.8" opacity="0.25"/>
  <line x1="200" y1="179" x2="312" y2="121" stroke="#00E5FF" stroke-width="0.8" opacity="0.25"/>

  <!-- Corner nodes -->
  <circle cx="256" cy="92"  r="8"  fill="#00E5FF" filter="url(#glow)"/>
  <circle cx="368" cy="150" r="6"  fill="#00CCEE" filter="url(#glow)"/>
  <circle cx="144" cy="150" r="6"  fill="#7B2FFF" filter="url(#glow)"/>
  <circle cx="256" cy="208" r="7"  fill="#A78BFF" filter="url(#glowSm)"/>
  <circle cx="368" cy="290" r="6"  fill="#7B2FFF" filter="url(#glowSm)"/>
  <circle cx="144" cy="290" r="6"  fill="#6B22EE" filter="url(#glowSm)"/>
  <circle cx="256" cy="348" r="8"  fill="#7B2FFF" filter="url(#glow)"/>

  <!-- PM monogram -->
  <text x="256" y="430"
    font-family="'Exo 2', 'Arial Black', sans-serif"
    font-size="64" font-weight="900" letter-spacing="8"
    fill="url(#tg1)" text-anchor="middle" filter="url(#glowSm)">PM</text>
  <line x1="156" y1="448" x2="356" y2="448" stroke="url(#cg1)" stroke-width="1.5" opacity="0.4"/>

  <!-- Border -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.12"/>
</svg>
