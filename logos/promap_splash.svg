<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0817"/>
      <stop offset="100%" stop-color="#060312"/>
    </linearGradient>
    <linearGradient id="cg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#7B2FFF"/>
    </linearGradient>
    <linearGradient id="tg1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="55%" stop-color="#A78BFF"/>
      <stop offset="100%" stop-color="#7B2FFF"/>
    </linearGradient>
    <linearGradient id="cubeTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#7B2FFF"/>
    </linearGradient>
    <linearGradient id="cubeRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7B2FFF"/>
      <stop offset="100%" stop-color="#4A1A9A"/>
    </linearGradient>
    <linearGradient id="cubeLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00BFCC"/>
      <stop offset="100%" stop-color="#006680"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSm" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Grid -->
  <line x1="0"   y1="380" x2="800" y2="380" stroke="#00E5FF" stroke-width="0.4" opacity="0.15"/>
  <line x1="0"   y1="410" x2="800" y2="410" stroke="#00E5FF" stroke-width="0.4" opacity="0.1"/>
  <line x1="0"   y1="438" x2="800" y2="438" stroke="#00E5FF" stroke-width="0.3" opacity="0.07"/>
  <line x1="120" y1="360" x2="108" y2="500" stroke="#7B2FFF" stroke-width="0.4" opacity="0.1"/>
  <line x1="240" y1="360" x2="234" y2="500" stroke="#7B2FFF" stroke-width="0.4" opacity="0.1"/>
  <line x1="360" y1="360" x2="358" y2="500" stroke="#7B2FFF" stroke-width="0.4" opacity="0.1"/>
  <line x1="480" y1="360" x2="482" y2="500" stroke="#7B2FFF" stroke-width="0.4" opacity="0.1"/>
  <line x1="600" y1="360" x2="606" y2="500" stroke="#7B2FFF" stroke-width="0.4" opacity="0.1"/>
  <line x1="720" y1="360" x2="730" y2="500" stroke="#7B2FFF" stroke-width="0.3" opacity="0.07"/>

  <!-- Projection rays from cube -->
  <line x1="280" y1="220" x2="0"   y2="80"  stroke="#00E5FF" stroke-width="0.8" opacity="0.2"/>
  <line x1="280" y1="220" x2="0"   y2="160" stroke="#00E5FF" stroke-width="0.7" opacity="0.15"/>
  <line x1="280" y1="220" x2="0"   y2="250" stroke="#7B2FFF" stroke-width="0.8" opacity="0.2"/>
  <line x1="280" y1="220" x2="0"   y2="340" stroke="#7B2FFF" stroke-width="0.7" opacity="0.15"/>
  <line x1="280" y1="220" x2="0"   y2="400" stroke="#A78BFF" stroke-width="0.6" opacity="0.12"/>

  <!-- CUBE -->
  <polygon points="280,100 390,158 280,216 170,158"
    fill="#0D0B1E" stroke="url(#cubeTop)" stroke-width="2" stroke-linejoin="round"/>
  <polygon points="390,158 390,290 280,348 280,216"
    fill="#08051A" stroke="url(#cubeRight)" stroke-width="2" stroke-linejoin="round"/>
  <polygon points="170,158 280,216 280,348 170,290"
    fill="#0A0720" stroke="url(#cubeLeft)" stroke-width="2" stroke-linejoin="round"/>

  <!-- Top face inner lines -->
  <line x1="280" y1="100" x2="280" y2="216" stroke="#00E5FF" stroke-width="0.8" opacity="0.35"/>
  <line x1="225" y1="129" x2="335" y2="187" stroke="#00E5FF" stroke-width="0.6" opacity="0.25"/>
  <line x1="225" y1="187" x2="335" y2="129" stroke="#00E5FF" stroke-width="0.6" opacity="0.25"/>

  <!-- Corner nodes -->
  <circle cx="280" cy="100" r="6"  fill="#00E5FF" filter="url(#glow)"/>
  <circle cx="390" cy="158" r="5"  fill="#00CCEE" filter="url(#glow)"/>
  <circle cx="170" cy="158" r="5"  fill="#7B2FFF" filter="url(#glow)"/>
  <circle cx="280" cy="216" r="5"  fill="#A78BFF" filter="url(#glowSm)"/>
  <circle cx="390" cy="290" r="5"  fill="#7B2FFF" filter="url(#glowSm)"/>
  <circle cx="170" cy="290" r="5"  fill="#6B22EE" filter="url(#glowSm)"/>
  <circle cx="280" cy="348" r="6"  fill="#7B2FFF" filter="url(#glow)"/>

  <!-- Wordmark -->
  <text x="430" y="230"
    font-family="'Exo 2', 'Arial Black', sans-serif"
    font-size="86" font-weight="300" letter-spacing="-2"
    fill="#00CFEE" opacity="0.95">Pro</text>
  <text x="580" y="230"
    font-family="'Exo 2', 'Arial Black', sans-serif"
    font-size="86" font-weight="900" letter-spacing="-3"
    fill="url(#tg1)">Map</text>

  <!-- Underline -->
  <line x1="430" y1="248" x2="790" y2="248" stroke="url(#cg1)" stroke-width="1.5" opacity="0.45"/>

  <!-- Tagline -->
  <text x="430" y="272"
    font-family="'Exo 2', monospace, sans-serif"
    font-size="13" font-weight="300" letter-spacing="5"
    fill="#A78BFF" opacity="0.65">3D PROJECTION MAPPING</text>

  <!-- Loading bar -->
  <rect x="430" y="380" width="360" height="2.5" rx="1.5" fill="#1A1530"/>
  <rect x="430" y="380" width="240" height="2.5" rx="1.5" fill="url(#cg1)" opacity="0.7"/>

  <text x="430" y="402"
    font-family="'Exo 2', monospace, sans-serif"
    font-size="9" font-weight="300" letter-spacing="3"
    fill="#3A3060" opacity="0.9">LOADING SCENE...</text>

  <!-- Version -->
  <text x="790" y="480"
    font-family="'Exo 2', monospace, sans-serif"
    font-size="9" font-weight="300" letter-spacing="1"
    fill="#2A2040" text-anchor="end">v2.0.0</text>
</svg>
